<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anatomical Scorpio - Clean & Fixed</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
        canvas { display: block; }
    </style>
</head>
<body>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let width, height;
let mouse = { x: 0, y: 0 };

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    mouse.x = width / 2;
    mouse.y = height / 2;
}

window.addEventListener('resize', resize);
window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener('touchstart', e => { 
    mouse.x = e.touches[0].clientX; 
    mouse.y = e.touches[0].clientY; 
});
resize();

class Leg {
    constructor(parent, side, offsetZ, length, isPincer = false) {
        this.parent = parent;
        this.side = side;
        this.offsetZ = offsetZ;
        this.len = length / 2;
        this.isPincer = isPincer;
        this.footPos = { x: parent.x, y: parent.y };
        this.nextStep = { x: parent.x, y: parent.y };
        this.isStepping = false;
        this.stepProg = 0;
        this.stepDuration = 0.11 + Math.random() * 0.05;
    }

    update() {
        const angleOffset = this.isPincer ? 0.48 : 1.38;
        const distFromBody = this.isPincer ? 88 : 62;

        const idealX = this.parent.x + Math.cos(this.parent.angle + angleOffset * this.side) * distFromBody
                     + Math.cos(this.parent.angle) * this.offsetZ;
        const idealY = this.parent.y + Math.sin(this.parent.angle + angleOffset * this.side) * distFromBody
                     + Math.sin(this.parent.angle) * this.offsetZ;

        const dist = Math.hypot(this.footPos.x - idealX, this.footPos.y - idealY);

        if (dist > 48 && !this.isStepping && this.parent.speed > 0.4) {
            this.isStepping = true;
            this.stepProg = 0;
            this.nextStep = { x: idealX, y: idealY };
        }

        if (this.isStepping) {
            this.stepProg += this.stepDuration;
            const t = Math.min(this.stepProg, 1);
            const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; // smoother ease-in-out
            this.footPos.x += (this.nextStep.x - this.footPos.x) * eased;
            this.footPos.y += (this.nextStep.y - this.footPos.y) * eased;

            if (this.stepProg >= 1) {
                this.isStepping = false;
                this.footPos.x = this.nextStep.x;
                this.footPos.y = this.nextStep.y;
            }
        }
    }

    draw() {
        const rootX = this.parent.x + Math.cos(this.parent.angle) * this.offsetZ
                    + Math.cos(this.parent.angle + Math.PI/2 * this.side) * 10;
        const rootY = this.parent.y + Math.sin(this.parent.angle) * this.offsetZ
                    + Math.sin(this.parent.angle + Math.PI/2 * this.side) * 10;

        const dx = this.footPos.x - rootX;
        const dy = this.footPos.y - rootY;
        const d = Math.min(Math.hypot(dx, dy), this.len * 2);
        const a = Math.atan2(dy, dx);
        const b = Math.acos(d / (2 * this.len)) * this.side;

        const jX = rootX + Math.cos(a + b) * this.len;
        const jY = rootY + Math.sin(a + b) * this.len;

        ctx.strokeStyle = "#3af5f0";
        ctx.lineWidth = this.isPincer ? 4.2 : 2.6;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        ctx.beginPath();
        ctx.moveTo(rootX, rootY);
        ctx.lineTo(jX, jY);
        ctx.lineTo(this.footPos.x, this.footPos.y);
        ctx.stroke();

        if (this.isPincer) {
            this.drawPincer(this.footPos.x, this.footPos.y, a);
        }
    }

    drawPincer(x, y, angle) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle + Math.PI/2);
        ctx.fillStyle = "#3af5f0";

        // Bulb
        ctx.beginPath();
        ctx.ellipse(0, 0, 13, 8, 0, 0, Math.PI * 2);
        ctx.fill();

        // Left claw
        ctx.beginPath();
        ctx.moveTo(9, -5);
        ctx.quadraticCurveTo(26, -16, 20, -2);
        ctx.quadraticCurveTo(25, -6, 9, -5);
        ctx.fill();

        // Right claw
        ctx.beginPath();
        ctx.moveTo(9, 5);
        ctx.quadraticCurveTo(26, 16, 20, 2);
        ctx.quadraticCurveTo(25, 6, 9, 5);
        ctx.fill();

        ctx.restore();
    }
}

class Scorpion {
    constructor() {
        this.x = width / 2;
        this.y = height / 2;
        this.angle = 0;
        this.prevX = this.x;
        this.prevY = this.y;
        this.speed = 0;

        this.legs = [];
        this.tail = [];

        // Pincers
        this.legs.push(new Leg(this, -1, 38, 95, true));
        this.legs.push(new Leg(this,  1, 38, 95, true));

        // Walking legs (4 pairs)
        for (let i = 0; i < 4; i++) {
            this.legs.push(new Leg(this, -1, 20 - i * 24, 72));
            this.legs.push(new Leg(this,  1, 20 - i * 24, 72));
        }

        // Tail segments
        for (let i = 0; i < 13; i++) {
            this.tail.push({ x: this.x, y: this.y, r: 13 - i * 0.95 });
        }
    }

    update() {
        this.prevX = this.x;
        this.prevY = this.y;

        const dx = mouse.x - this.x;
        const dy = mouse.y - this.y;
        const dist = Math.hypot(dx, dy);

        if (dist > 25) {
            const targetAngle = Math.atan2(dy, dx);
            let diff = targetAngle - this.angle;
            diff = ((diff + Math.PI) % (Math.PI * 2)) - Math.PI;
            this.angle += diff * 0.085;

            this.x += Math.cos(this.angle) * 3.4;
            this.y += Math.sin(this.angle) * 3.4;
        }

        this.speed = Math.hypot(this.x - this.prevX, this.y - this.prevY);

        this.legs.forEach(l => l.update());

        // Tail follow
        let prevX = this.x - Math.cos(this.angle) * 32;
        let prevY = this.y - Math.sin(this.angle) * 32;

        this.tail.forEach((seg, i) => {
            const dx = prevX - seg.x;
            const dy = prevY - seg.y;
            const dist = Math.hypot(dx, dy);

            if (dist > 15) {
                const angle = Math.atan2(dy, dx);
                seg.x = prevX - Math.cos(angle) * 15;
                seg.y = prevY - Math.sin(angle) * 15;
            }

            // Gentle oscillation when moving
            if (this.speed > 0.6) {
                const waveAmp = 0.5 + this.speed * 0.9;
                const wave = Math.sin(Date.now() * 0.0035 + i * 0.75) * waveAmp;
                seg.x += Math.cos(this.angle + Math.PI/2) * wave;
                seg.y += Math.sin(this.angle + Math.PI/2) * wave;
            }

            prevX = seg.x;
            prevY = seg.y;
        });
    }

    draw() {
        // Draw legs first
        this.legs.forEach(l => l.draw());

        // Body with face
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);

        // Cephalothorax
        ctx.fillStyle = "#3af5f0";
        ctx.beginPath();
        ctx.ellipse(32, 0, 20, 15, 0, 0, Math.PI * 2);
        ctx.fill();

        // Mesosoma
        for (let i = 0; i < 5; i++) {
            ctx.beginPath();
            ctx.ellipse(10 - i * 15, 0, 14 - i*1.3, 17 - i*2, 0, 0, Math.PI * 2);
            ctx.fill();
        }

        // Face / Eyes / Chelicerae
        // Eyes (simple clusters)
        ctx.fillStyle = "#000";
        ctx.beginPath();
        ctx.arc(48, -6, 3.5, 0, Math.PI*2);
        ctx.arc(48, 6, 3.5, 0, Math.PI*2);
        ctx.arc(52, -3, 2.8, 0, Math.PI*2);
        ctx.arc(52, 3, 2.8, 0, Math.PI*2);
        ctx.fill();

        // Median eyes (smaller, central)
        ctx.beginPath();
        ctx.arc(50, 0, 2.2, 0, Math.PI*2);
        ctx.fill();

        // Chelicerae (small mouth parts in front)
        ctx.fillStyle = "#3af5f0";
        ctx.beginPath();
        ctx.moveTo(55, -4);
        ctx.lineTo(62, -8);
        ctx.lineTo(62, -2);
        ctx.closePath();
        ctx.moveTo(55, 4);
        ctx.lineTo(62, 8);
        ctx.lineTo(62, 2);
        ctx.closePath();
        ctx.fill();

        ctx.restore();

        // Tail
        this.tail.forEach((seg, i) => {
            ctx.fillStyle = i === this.tail.length - 1 ? "#ff88cc" : "#3af5f0";
            ctx.beginPath();
            ctx.arc(seg.x, seg.y, seg.r, 0, Math.PI * 2);
            ctx.fill();

            if (i > 0) {
                const prev = this.tail[i-1];
                ctx.strokeStyle = "#3af5f0";
                ctx.lineWidth = seg.r * 1.5;
                ctx.lineCap = "round";
                ctx.beginPath();
                ctx.moveTo(prev.x, prev.y);
                ctx.lineTo(seg.x, seg.y);
                ctx.stroke();
            }

            // Stinger
            if (i === this.tail.length - 1) {
                const prev = this.tail[i-1];
                const dx = seg.x - prev.x;
                const dy = seg.y - prev.y;
                const len = Math.hypot(dx, dy) || 1;
                const ux = dx / len;
                const uy = dy / len;

                ctx.strokeStyle = "#ff88cc";
                ctx.lineWidth = 5.5;
                ctx.beginPath();
                ctx.moveTo(seg.x, seg.y);
                ctx.lineTo(seg.x + ux * 26, seg.y + uy * 26);
                ctx.stroke();

                ctx.fillStyle = "#ff88cc";
                ctx.beginPath();
                ctx.arc(seg.x + ux * 26, seg.y + uy * 26, 4.5, 0, Math.PI * 2);
                ctx.fill();
            }
        });
    }
}

const scorpio = new Scorpion();

function animate() {
    ctx.fillStyle = "rgba(0,0,0,0.10)";
    ctx.fillRect(0, 0, width, height);

    scorpio.update();
    scorpio.draw();

    requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
